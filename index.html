    <!-- Structured Data (JSON-LD for Google) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "The Mat Hatch",
        "url": "https://themathatch.com/",
        "description": "Premium extended gaming mousepads and custom desk mats in Bangladesh.",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://themathatch.com/products?search={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
